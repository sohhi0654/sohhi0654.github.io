<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Azapon Tools</title>

<style>
/* ===============================
   🌌 背景（index.html と同一）
   =============================== */
body {
  margin: 0;
  background: radial-gradient(circle at center, #111 0%, #000 70%);
  color: #eee;
  font-family: sans-serif;
  transition: background 0.3s;
}

body.bg-off {
  background: #000;
}

/* ===============================
   🧰 ツール一覧UI
   =============================== */
#container {
  padding: 20px;
}

h1 {
  margin-top: 0;
  font-size: 22px;
}

.tool-list {
  list-style: none;
  padding: 0;
}

.tool-list li {
  margin-bottom: 10px;
}

.tool-list a {
  display: block;
  padding: 10px 14px;
  background: #1a1a1a;
  border: 1px solid #444;
  color: #0ff;
  text-decoration: none;
}

.tool-list a:hover {
  background: #222;
}

/* 背景切り替えボタン */
#bgToggle {
  margin-top: 20px;
  padding: 8px 12px;
  background: #222;
  color: #fff;
  border: 1px solid #555;
  cursor: pointer;
}
</style>
</head>

<script>
/* ===============================
   🎨 背景制御（index.html と同じ）
   =============================== */
const bgToggleBtn = document.getElementById("bgToggle");
let bgEnabled = true;

bgToggleBtn.onclick = () => {
  bgEnabled = !bgEnabled;

  // ★ 背景を制御しているのはここ
  document.body.classList.toggle("bg-off", !bgEnabled);
};
</script>
